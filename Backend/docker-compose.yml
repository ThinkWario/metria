version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: drofit_postgres
    restart: always
    environment:
      POSTGRES_USER: drofit_user
      POSTGRES_PASSWORD: drofit_password
      POSTGRES_DB: drofit_metrics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drofit_user -d drofit_metrics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drofit_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
